services:
  postgres:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    env_file: .env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    image: nginx:1.28-alpine
    ports:
      # 8080 côté hôte : Docker rootless ne peut pas binder les ports < 1024.
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"

volumes:
  pg_data:
  uploads:
  backend_node_modules:
  frontend_node_modules:
